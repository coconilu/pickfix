name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "bug: "
labels: ["type: bug", "status: needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: PickFix fails to...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Run `pnpm dev`
        2. Open `http://localhost:3001`
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include logs, screenshots, or error messages if possible.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - apps/web
        - packages/bridge
        - packages/proxy
        - packages/cli
        - examples
        - docs
        - not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the versions and system details that may matter.
      value: |
        - OS:
        - Browser:
        - Node:
        - pnpm:
        - PickFix version/commit:
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that could help diagnose the issue.
