name: Feature request
description: Suggest a focused improvement or new capability.
title: "feat: "
labels: ["type: feature", "status: needs discussion"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow gap should this solve?
      placeholder: It is hard to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
      placeholder: Add support for...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and explicitly out of scope?
      value: |
        In scope:
        -

        Out of scope:
        -
    validations:
      required: true

  - type: dropdown
    id: packages
    attributes:
      label: Affected packages
      multiple: true
      options:
        - apps/web
        - packages/bridge
        - packages/proxy
        - packages/cli
        - examples
        - docs
        - not sure
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be considered done?
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention other approaches and why they are less ideal.
